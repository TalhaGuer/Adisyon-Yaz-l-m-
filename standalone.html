      if(!products || products.length < 2){ state.promos = []; return; }
      // create up to 4 promos by pairing products
      const maxPromos = Math.min(4, Math.floor(products.length/2));
      for(let i=0;i<maxPromos;i++){
        const items = products.slice(i*2, i*2+2);

        const sum = items.reduce((s,p)=> s + (p.price||0), 0);
        const discount = 0.12; // 12% kampanya indirimi
        const price = Math.round(sum * (1 - discount) * 100) / 100;
        const name = items.map(x=> x.name).join(' + ');
        promos.push({ id: 'promo-' + Date.now() + '-' + i, name: name + ' (Kampanya)', items, price, discountLabel: (discount*100) + '%' });
      }
      state.promos = promos;
    }

        const today = new Date();
        const dailyTotal = state.sales_history ? Object.values(state.sales_history).filter(s=> s.day===today.getDate() && s.month=== (today.getMonth()+1) && s.year===today.getFullYear()).reduce((a,b)=> a + (b.total||0), 0) : 0;
        const monthlyTotal = state.sales_history ? Object.values(state.sales_history).filter(s=> s.month=== (today.getMonth()+1) && s.year===today.getFullYear()).reduce((a,b)=> a + (b.total||0), 0) : 0;
        const yearlyTotal = state.sales_history ? Object.values(state.sales_history).filter(s=> s.year===today.getFullYear()).reduce((a,b)=> a + (b.total||0), 0) : 0;
        const wrap = el('div',{class:'grid grid-cols-3 gap-4 mb-6'}, [ card('Günlük Ciro', dailyTotal), card('Aylık Ciro', monthlyTotal), card('Yıllık Ciro', yearlyTotal) ]);
        return wrap;
      }

      function card(title, amount){ return el('div',{class:'p-4 bg-gray-800 rounded'}, [ el('div',{class:'text-sm text-gray-400'}, title), el('div',{class:'text-2xl font-bold mt-2'}, formatMoney(amount)) ]); }

      function salesTable(){
        const container = el('div',{class:'bg-gray-800 rounded p-4'}, [ el('h3',{class:'mb-2 font-semibold'}, 'Geçmiş Satışlar') ]);
        const tableWrap = el('div',{class:'overflow-x-auto'});
        const table = el('table',{class:'min-w-full text-left'}, [ el('thead',{}, el('tr',{class:'text-gray-400'}, [ el('th',{class:'px-3 py-2'}, 'Tarih'), el('th',{class:'px-3 py-2'}, 'Masa'), el('th',{class:'px-3 py-2'}, 'Ödeme'), el('th',{class:'px-3 py-2'}, 'Tutar') ])) ]);
        const tbody = el('tbody',{});
        Object.entries(state.sales_history || {}).sort((a,b)=> b[1].createdAt - a[1].createdAt).forEach(([id,s])=>{
          tbody.appendChild(el('tr',{class:'border-t border-gray-700'}, [ el('td',{class:'px-3 py-2'}, s.day + '/' + s.month + '/' + s.year), el('td',{class:'px-3 py-2'}, s.table), el('td',{class:'px-3 py-2'}, s.paymentMethod), el('td',{class:'px-3 py-2'}, formatMoney(s.total)) ]));
        });
        table.appendChild(tbody); tableWrap.appendChild(table); container.appendChild(tableWrap); return container;
      }

      function receiptContent(){
        // Prefer the last closed sale (state.last_sale) for printing. Fallback to active order.
        const sale = state.last_sale || (()=>{ const sel = app.selectedTable; const order = state.active_orders[sel]; if(!order) return null; return { id: 'preview-' + Date.now(), table: sel, items: order.items, total: orderTotal(order), paymentMethod: 'N/A', createdAt: Date.now() }; })();
        if(!sale) return el('div',{}, 'Satış kaydı bulunmuyor.');

        const dt = new Date(sale.createdAt || Date.now());
        const invoiceId = sale.id || ('s' + Date.now());
        const header = el('div',{}, [ el('div',{class:'text-center font-bold'}, state.settings.name), el('div',{class:'text-center text-sm'}, state.settings.address + ' · Tel: ' + state.settings.phone), el('div',{class:'text-center text-sm mt-1'}, 'Fatura: ' + invoiceId), el('div',{class:'text-center text-sm muted'}, dt.toLocaleString()) ]);

        const itemsWrap = el('div',{style:'margin-top:8px;'}, []);
        let subtotal = 0;
        (sale.items||[]).forEach(it=>{ const lineTotal = (it.price||0) * (it.qty||1); subtotal += lineTotal; itemsWrap.appendChild(el('div',{style:'display:flex;justify-content:space-between'}, [ el('div',{}, it.name + ' x' + it.qty), el('div',{}, formatMoney(lineTotal)) ])); });

        const taxRate = 0.18; // %18 KDV
        const tax = Math.round(subtotal * taxRate * 100) / 100;
        const total = Math.round((subtotal + tax) * 100) / 100;

        const taxLabel = (state.settings && state.settings.taxRate ? state.settings.taxRate : 18);
        const totals = el('div',{style:'margin-top:8px; border-top:1px dashed #ccc; padding-top:6px;'}, [ el('div',{style:'display:flex;justify-content:space-between'}, [ el('div',{}, 'Ara Toplam'), el('div',{}, formatMoney(subtotal)) ]), el('div',{style:'display:flex;justify-content:space-between'}, [ el('div',{}, 'KDV (' + taxLabel + '%)'), el('div',{}, formatMoney(tax)) ]), el('div',{style:'display:flex;justify-content:space-between; margin-top:6px; font-weight:bold;'}, [ el('div',{}, 'Genel Toplam'), el('div',{}, formatMoney(total)) ]) ]);

        const payment = el('div',{style:'margin-top:8px;'}, [ el('div',{}, 'Ödeme: ' + (sale.paymentMethod || 'N/A')), el('div',{class:'text-sm muted'}, 'Kasiyer: ' + (state.settings && state.settings.cashier ? state.settings.cashier : 'Kasiyer')) ]);

        const footer = el('div',{style:'margin-top:12px; text-align:center; font-size:11px;'}, [ el('div',{}, 'Teşekkürler!'), el('div',{}, 'www.lezzetbufe.example') ]);

        const wrap = el('div',{}, [ header, itemsWrap, totals, payment, footer ]);
        return wrap;
      }

      // Utilities
      function el(tag, attrs, children){
        const node = document.createElement(tag);
        if(attrs){
          Object.entries(attrs).forEach(([k,v])=>{
            if(k==='class') node.className = v;
            else if(k==='style') {
              if(typeof v === 'string') node.style.cssText = v;
              else if(typeof v === 'object' && v !== null) Object.assign(node.style, v);
            }
            else if(k==='onclick') node.addEventListener('click', v);
            else node.setAttribute(k, v);
          });
        }
        if(children){
          if(Array.isArray(children)) children.forEach(c=> node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
          else node.appendChild(typeof children === 'string' ? document.createTextNode(children) : children);
        }
        return node;
      }

      // Return a safe path for image filenames (handles spaces and non-ASCII)
      function imagePath(name){ if(!name) return ''; try{ return encodeURI(name); } catch(e){ return name; } }

      // Theme helpers: persist preference and apply `dark` class on <html>
      function applyTheme(theme){
        const root = document.documentElement;
        if(theme === 'dark') root.classList.add('dark'); else root.classList.remove('dark');
        try{ localStorage.setItem('theme', theme); }catch(e){}
      }
      function getSavedTheme(){ try{ const s = localStorage.getItem('theme'); if(s) return s; }catch(e){} return null; }
      function detectSystemTheme(){ try{ return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }catch(e){ return 'light'; } }
      function initTheme(){ const saved = getSavedTheme(); applyTheme(saved || detectSystemTheme()); }

      let lastOrderEventTs = 0;
      function initOrderListener(){
        const channel = window.BroadcastChannel ? new BroadcastChannel('order-events') : null;
        function handleOrderEvent(data){
          if(!data || data.event !== 'orderCreated') return;
          if(!data._ts) data._ts = Date.now();
          if(data._ts && data._ts <= lastOrderEventTs) return;
          lastOrderEventTs = data._ts || Date.now();
          const label = data.platform === 'yemeksepeti' ? 'Yemeksepeti' : data.platform === 'trendyol' ? 'Trendyol' : 'Getir';
          const text = `Yeni ${label} siparişi alındı · #${data.orderId} · ${data.total}`;
          showToast(text);
          playBeep();
          if(data.platform){
            state.incoming_orders[data.platform] = state.incoming_orders[data.platform] || [];
            state.incoming_orders[data.platform].unshift(data);
            saveState(state);
            app.platformView = data.platform;
            app.platformHistoryView = false;
            render();
          }
        }
        function checkStorageEvent(){
          try{
            const raw = localStorage.getItem('order-event');
            if(!raw) return;
            const data = JSON.parse(raw);
            handleOrderEvent(data);
          } catch(e){}
        }
        if(channel){ channel.addEventListener('message', (evt)=> handleOrderEvent(evt.data)); }
        window.addEventListener('storage', (evt)=>{
          if(evt.key !== 'order-event' || !evt.newValue) return;
          try{ const data = JSON.parse(evt.newValue); handleOrderEvent(data); } catch(e){}
        });
        window.addEventListener('focus', checkStorageEvent);
        setInterval(checkStorageEvent, 1200);
      }

      function showToast(text){
        let toast = document.getElementById('order-toast');
        if(!toast){
          toast = document.createElement('div');
          toast.id = 'order-toast';
          toast.className = 'toast';
          document.body.appendChild(toast);
        }
        toast.textContent = text;
        toast.classList.add('visible');
        clearTimeout(toast.__timeout);
        toast.__timeout = setTimeout(()=> toast.classList.remove('visible'), 3800);
      }

      function printIncomingOrder(order){
        const receiptEl = document.querySelector('.receipt-print');
        if(!receiptEl){ alert('Yazdırma alanı bulunamadı.'); return; }
        const orderTime = new Date(order._ts || order.createdAt || Date.now()).toLocaleString('tr-TR');
        receiptEl.innerHTML = `
          <div class="p-4 bg-white text-black">
            <h1 style="font-size:1.4rem;margin-bottom:0.75rem;">Sipariş ${order.orderId}</h1>
            <p><strong>Platform:</strong> ${order.platform}</p>
            <p><strong>Masa / Adres:</strong> ${order.location || 'Belirtilmedi'}</p>
            <p><strong>Zaman:</strong> ${orderTime}</p>
            <div style="margin-top:12px;padding:12px;background:#eef2ff;border-radius:12px;"><strong>Not:</strong> ${order.note || 'Yok'}</div>
            <table style="width:100%;border-collapse:collapse;margin-top:18px;">
              <thead>
                <tr style="background:#e2e8f0;text-align:left;">
                  <th style="padding:10px;border:1px solid #d1d5db;">Ürün</th>
                  <th style="padding:10px;border:1px solid #d1d5db;">Adet</th>
                  <th style="padding:10px;border:1px solid #d1d5db;">Birim</th>
                  <th style="padding:10px;border:1px solid #d1d5db;">Toplam</th>
                </tr>
              </thead>
              <tbody>
                ${order.items.map(item => `<tr><td style="padding:10px;border:1px solid #d1d5db;">${item.name}</td><td style="padding:10px;border:1px solid #d1d5db;">${item.qty}</td><td style="padding:10px;border:1px solid #d1d5db;">${formatMoney(item.price)}</td><td style="padding:10px;border:1px solid #d1d5db;">${formatMoney((item.price||0) * item.qty)}</td></tr>`).join('')}
              </tbody>
            </table>
            <p style="margin-top:16px;font-weight:700;">Toplam: ${order.total}</p>
          </div>
        `;
        receiptEl.style.display = 'block';
        setTimeout(()=>{
          window.print();
          receiptEl.style.display = 'none';
        }, 200);
      }

      function markOrderDelivered(platform, orderId){
        const orders = state.incoming_orders[platform] || [];
        const index = orders.findIndex(o=> o.orderId === orderId);
        if(index === -1) return;
        const order = orders.splice(index,1)[0];
        state.platform_history[platform] = state.platform_history[platform] || [];
        order.deliveredAt = Date.now();
        state.platform_history[platform].unshift(order);
        saveState(state);
        render();
      }

      function renderPlatformHistory(platform, wrap, platformName){
        const history = (state.platform_history[platform] || []).slice();
        const header = el('div',{class:'rounded p-4 mb-4 bg-slate-800 text-slate-100'}, [ el('div',{class:'font-semibold text-lg'}, platformName + ' - Geçmiş Siparişler'), el('div',{class:'text-sm muted mt-1'}, 'Teslim edilmiş siparişler burada saklanır.') ]);
        wrap.appendChild(header);
        if(!history.length){
          wrap.appendChild(el('div',{class:'rounded p-6 bg-slate-800 text-slate-100 shadow'}, [ el('div',{class:'text-lg font-semibold mb-2'}, 'Geçmiş sipariş yok'), el('div',{class:'text-sm muted'}, 'Teslim edildi butonuna basılan siparişler burada görünür.') ]));
          return wrap;
        }
        history.forEach(order => {
          const delivered = new Date(order.deliveredAt || order._ts || Date.now()).toLocaleString('tr-TR');
          const card = el('div',{class:'rounded-xl p-5 mb-4 bg-slate-900 text-slate-100 shadow-lg'}, [
            el('div',{class:'flex flex-col md:flex-row md:items-start md:justify-between gap-3'}, [ el('div',{}, [ el('div',{class:'text-xl font-semibold'}, order.orderId), el('div',{class:'text-sm muted mt-1'}, `Teslim edildi: ${delivered}`) ]), el('div',{class:'text-lg font-bold'}, order.total) ]),
            el('div',{class:'mt-4 grid gap-2'}, order.items.map(item => el('div',{class:'flex justify-between text-sm text-slate-200 rounded-md bg-slate-800 p-3'}, [ el('div',{}, `${item.name} x${item.qty}`), el('div',{}, formatMoney((item.price || 0) * item.qty)) ]))),
            el('div',{class:'grid gap-2 mt-4 border-t border-slate-700 pt-4'}, [ el('div',{class:'text-sm'}, [ el('span',{class:'font-semibold'}, 'Sipariş notu: '), order.note || 'Yok' ]), el('div',{class:'text-sm'}, [ el('span',{class:'font-semibold'}, 'Oluşturma: '), getTimeAgo(order._ts) ]) ])
          ]);
          wrap.appendChild(card);
        });
        return wrap;
      }

      function playBeep(){
        try{
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if(!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(660, ctx.currentTime);
          gain.gain.setValueAtTime(0.02, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.14, ctx.currentTime + 0.08);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.38);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.4);
          setTimeout(()=> ctx.close(), 500);
        } catch(e){}
      }

      // Create a combined theme switch element with sun/moon icons and draggable knob
      function createThemeSwitch(){
        const container = document.createElement('div');
        container.className = 'theme-switch';

        const sun = document.createElement('div'); sun.className = 'icon sun'; sun.innerHTML = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 4V2M12 22v-2M4.93 4.93L3.51 3.51M20.49 20.49l-1.42-1.42M4 12H2M22 12h-2M4.93 19.07l-1.42 1.42M20.49 3.51l-1.42 1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>';
        const moon = document.createElement('div'); moon.className = 'icon moon'; moon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        const track = document.createElement('div'); track.className = 'track';
        const knob = document.createElement('div'); knob.className = 'knob';
        track.appendChild(knob);

        container.appendChild(sun);
        container.appendChild(track);
        container.appendChild(moon);

        // Sync initial state
        const isDark = document.documentElement.classList.contains('dark');
        container.classList.toggle('dark', isDark);
        container.classList.toggle('light', !isDark);
        knob.style.transform = isDark ? 'translateX(calc(100% - 40px))' : 'translateX(0)';

        function setState(dark){
          container.classList.toggle('dark', dark);
          container.classList.toggle('light', !dark);
          knob.style.transform = dark ? 'translateX(calc(100% - 40px))' : 'translateX(0)';
          applyTheme(dark ? 'dark' : 'light');
        }

        // Click to toggle (pressable, no drag)
        container.addEventListener('click', (e)=>{
          const nowDark = document.documentElement.classList.contains('dark');
          setState(!nowDark);
        });

        return container;
      }

      function button(text, cb, cls){ const b = el('button',{class: cls || 'px-2 py-1 rounded bg-gray-700', onclick: cb}, text); return b; }

      // Actions
      function addProduct(product){ const table = app.selectedTable; const order = state.active_orders[table]; if(!order){ state.active_orders[table] = { table, items: [{...product, qty:1}], updatedAt: Date.now() }; notifyChange(); return; } const items = order.items; const idx = items.findIndex(i=>i.id===product.id); if(idx===-1) items.push({...product, qty:1}); else items[idx].qty +=1; order.updatedAt = Date.now(); notifyChange(); }

      function changeQty(table, productId, delta){ const order = state.active_orders[table]; if(!order) return; const items = order.items; const idx = items.findIndex(i=>i.id===productId); if(idx===-1) return; items[idx].qty += delta; if(items[idx].qty<=0) items.splice(idx,1); if(items.length===0){ delete state.active_orders[table]; notifyChange(); return; } order.updatedAt = Date.now(); notifyChange(); }

      function closeBill(table, method){
        const order = state.active_orders[table]; if(!order) return;
        const total = orderTotal(order);
        const id = 's' + Date.now();
        const sale = { id, table, items: order.items, total, paymentMethod: method, createdAt: Date.now(), day: new Date().getDate(), month: new Date().getMonth()+1, year: new Date().getFullYear() };
        state.sales_history[id] = sale;
        // keep last sale for printing (we remove active order so receiptContent can use state.last_sale)
        state.last_sale = sale;
        delete state.active_orders[table];
        notifyChange();
        // print
        const receiptEl = document.querySelector('.receipt-print');
        if(receiptEl){ receiptEl.style.display = 'block'; setTimeout(()=>{ window.print(); receiptEl.style.display='none'; /* clear last_sale after printing */ setTimeout(()=>{ delete state.last_sale; notifyChange(); }, 300); }, 300); }
      }

      // App state
      const app = { selectedTable: 'Masa 1', viewReports: false, showProductManager: false, showSettings: false, openOrderFor: null, filterCategory: null, platformView: null, platformHistoryView: false };

      // Mock platform status data (true = active, false = offline)
      const platformStatus = {
        yemeksepeti: true,
        trendyol: false,
        getir: true
      };

      function togglePlatformStatus(key){
        platformStatus[key] = !platformStatus[key];
        render();
      }

      function renderPlatformStatusCards(){
        const platforms = [
          { key: 'yemeksepeti', name: 'Yemeksepeti' },
          { key: 'trendyol', name: 'Trendyol' },
          { key: 'getir', name: 'Getir' }
        ];
        const cardList = el('div',{class:'grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6'} , platforms.map(p=>{
          const active = platformStatus[p.key];
          return el('div',{class:'p-4 rounded bg-slate-900 text-white shadow'}, [
            el('div',{class:'text-sm uppercase tracking-wide text-gray-400 mb-2'}, p.name),
            el('div',{class:'text-3xl font-bold'}, active ? 'Aktif' : 'Kapalı'),
            el('div',{class:'text-sm mt-2', style:'color:' + (active ? '#94f6a0' : '#fca5a5')}, active ? 'Siparişleri alıyor' : 'Bağlantı yok'),
            el('div',{class:'mt-4'}, [
              button(active ? 'Kapat' : 'Aç', ()=>{ togglePlatformStatus(p.key); }, 'px-3 py-2 rounded ' + (active ? 'bg-red-600 text-white' : 'bg-emerald-500 text-white') + ' btn')
            ])
          ]);
        }));
        return cardList;
      }

      // Settings modal
      function renderSettingsModal(){
        const s = state.settings || {};
        const overlay = el('div',{class:'fixed inset-0 bg-black/50 flex items-center justify-center z-60 pm-overlay'});
        const modal = el('div',{class:'bg-white text-black w-1/2 max-w-lg rounded shadow-lg p-6'}, []);
        overlay.appendChild(modal);
        modal.appendChild(el('div',{class:'flex items-center justify-between mb-4'}, [ el('div',{class:'text-xl font-bold'}, 'Ayarlar'), button('Kapat', ()=>{ app.showSettings=false; render(); }, 'px-3 py-1 bg-slate-700 text-white rounded') ]));
        const nameIn = el('input',{class:'p-2 border rounded w-full mb-2', value: s.name});
        const addrIn = el('input',{class:'p-2 border rounded w-full mb-2', value: s.address});
        const phoneIn = el('input',{class:'p-2 border rounded w-full mb-2', value: s.phone});
        const taxIn = el('input',{class:'p-2 border rounded w-full mb-2', value: s.taxRate, type:'number'});
        const cashierIn = el('input',{class:'p-2 border rounded w-full mb-2', value: s.cashier});
        modal.appendChild(el('div',{}, [ el('div',{}, 'İşletme adı:'), nameIn, el('div',{}, 'Adres:'), addrIn, el('div',{}, 'Telefon:'), phoneIn, el('div',{}, 'KDV (%):'), taxIn, el('div',{}, 'Kasiyer adı:'), cashierIn ]));
        const save = button('Kaydet', ()=>{ state.settings = state.settings || {}; state.settings.name = nameIn.value||'YSN RESTORANT'; state.settings.address = addrIn.value||''; state.settings.phone = phoneIn.value||''; state.settings.taxRate = parseFloat(taxIn.value)||18; state.settings.cashier = cashierIn.value||'Kasiyer'; notifyChange(); app.showSettings=false; render(); }, 'mt-4 px-4 py-2 bg-emerald-600 text-white rounded');
        modal.appendChild(el('div',{class:'mt-4 flex justify-end'}, [ save ]));
        document.body.appendChild(overlay);
      }

      function render(){ createRoot(); }

      // Initialize theme, notifications and render
      initTheme();
      initOrderListener();
      render();

      // Expose for debugging
      window.__LB_STATE__ = state;
      window.__LB_APP__ = app;
    </script>
  </body>
